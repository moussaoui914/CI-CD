name: CI/CD Laravel API

on:
  push:
    branches: [ "main" ]

jobs:

  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: laravel
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      # 1. Clone code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      # 3. Install dependencies
      - name: Install Composer dependencies
        run: |
          cd src
          composer install

      # 4. Setup .env
      - name: Setup environment
        run: |
          cd src
          cp .env.example .env
          php artisan key:generate

      # 5. Run migrations
      - name: Run migrations
        run: |
          cd src
          php artisan migrate

      # 6. Unit tests
      - name: Run Unit Tests
        run: |
          cd src
          php artisan test --testsuite=Unit

      # 7. Integration tests
      - name: Run Integration Tests
        run: |
          cd src
          php artisan test --testsuite=Feature

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 8. Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t my-laravel-api .

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      # 9. Deploy (simple SSH)
      - name: Deploy to Server
        run: |
          echo "Deploying..."
          # Exemple simple:
          # ssh user@server "docker pull my-laravel-api && docker run -d -p 80:80 my-laravel-api"
