version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cicd_app
    volumes:
      - ./src:/var/www
    depends_on:
      - db
    expose:
      - "9000"
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=cicd
      - DB_USERNAME=cicd
      - DB_PASSWORD=secret

  web:
    image: nginx:alpine
    container_name: cicd_nginx
    ports:
      - "8084:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: cicd_db
    environment:
      MYSQL_DATABASE: cicd
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: cicd
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: cicd_pma
    ports:
      - "8085:80"
    environment:
      PMA_HOST: db
      PMA_USER: cicd
      PMA_PASSWORD: secret
    depends_on:
      - db

volumes:
  db_data: